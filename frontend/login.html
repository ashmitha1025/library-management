<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

/* Pink Gradient Background */
body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
}

/* Login Card */
.container {
  background: white;
  padding: 40px;
  width: 320px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  text-align: center;
}

/* Title */
h2 {
  margin-bottom: 20px;
  color: #ff4d6d;
}

/* Input fields */
input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: 1px solid #ddd;
  outline: none;
  transition: 0.3s;
}

input:focus {
  border-color: #ff4d6d;
  box-shadow: 0 0 6px rgba(255,77,109,0.4);
}

/* Button */
button {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, #ff4d6d, #ff758c);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
  margin-top: 10px;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 5px 15px rgba(255,77,109,0.4);
}

/* Footer */
.footer {
  margin-top: 15px;
  font-size: 12px;
  color: #888;
}
</style>

</head>

<body>

<div class="container">
  <h2>💗 Library Login</h2>

  <input id="email" placeholder="Email">
  <input id="pass" type="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <div class="footer">Library Management System</div>
</div>

<script>
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("pass").value;

  const res = await fetch("https://your-app.onrender.com/api/login", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({email,password})
  });

  const data = await res.json();

  if(data.success){
    window.location.href="dashboard.html";
  } else {
    alert("Invalid login");
  }
}
</script>

</body>
</html>
